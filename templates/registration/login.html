{% load static %}
{% load crispy_forms_tags %}
{% block title %}{% endblock %}

{% block content %}

    <link rel="stylesheet" href="/static/bootstrap441/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://unpkg.com/bootstrap-table@1.18.2/dist/bootstrap-table.min.css">
    <script src="/static/bootstrap441/js/bootstrap.min.js"></script>

    <!--link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"-->
    <div class="d-flex justify-content-center">
        <div class="card  shadow-lg p-3 mb-5 bg-white rounded" style="width: 20rem; margin-top: 20px">
            <p style="text-align: center">
                <img class="card-img-top" src="{% static 'img/seaterra_logo.png' %}" alt="SeaTerra Logo"
                      style="height: 81px;width: 115px">
            </p>

            {% if form.errors %}
                <p>Your username and password didn't match. Please try again.</p>
            {% else %}
                <p></p>
            {% endif %}

            <div class="card-body">
                <h5 class="card-title">Log In</h5>
                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <input type="hidden" name="next" value="{{ next }}"/>
                    <button type="submit" class="btn btn-primary">Log In</button>
                </form>
            </div>
        </div>
    </div>

{% endblock %}
