{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
  <h1>Erinnerung an ausgewählte Artikel senden</h1>
  <form method="post">{% csrf_token %}
    {{ form.as_p }}
    <input type="hidden" name="action" value="{{ action }}">
    {% for obj in queryset %}
      <input type="hidden" name="_selected_action" value="{{ obj.pk }}">
    {% endfor %}
    <button type="submit" name="apply">E-Mail senden</button>
  </form>
{% endblock %}
